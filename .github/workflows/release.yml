name: Build and Release Parasyte

on:
  push:
    tags:
      - 'v*' 

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]

    permissions:
      contents: write 

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11' 

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install nuitka zstandard

      - name: Build Binary with Nuitka
        run: |
          python -m nuitka --standalone --assume-yes-for-downloads --output-dir=dist parasyte.py

      - name: Archive Build
        run: |
          cd dist
          tar -czvf parasyte-${{ matrix.os }}.tar.gz parasyte.dist/

      - name: Upload to GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          files: dist/parasyte-${{ matrix.os }}.tar.gz
